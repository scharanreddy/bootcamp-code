version: "3.9"

services:
  backend:
    build: .
    command: uvicorn threatlens_ai.backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./:/app

  frontend:
    build: .
    command: streamlit run threatlens_ai.frontend.app --server.port 8501 --server.headless true
    ports:
      - "8501:8501"
    env_file:
      - .env.example
    volumes:
      - ./:/app
